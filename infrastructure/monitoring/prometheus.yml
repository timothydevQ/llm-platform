global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: "inference-gateway"
    static_configs:
      - targets: ["inference-gateway:8080"]
    metrics_path: /metrics

  - job_name: "model-router"
    static_configs:
      - targets: ["model-router:8081"]
    metrics_path: /metrics

  - job_name: "request-scheduler"
    static_configs:
      - targets: ["request-scheduler:8082"]
    metrics_path: /metrics

  - job_name: "worker-simulator"
    static_configs:
      - targets: ["worker-simulator:8083"]
    metrics_path: /metrics

  - job_name: "cache-service"
    static_configs:
      - targets: ["cache-service:8084"]
    metrics_path: /metrics
# global
