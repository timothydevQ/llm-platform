name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/llm-platform

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - inference-gateway
          - model-router
          - request-scheduler
          - cache-service
          - worker-simulator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/${{ matrix.service }}/go.mod
      - name: Tidy
        working-directory: services/${{ matrix.service }}
        run: go mod tidy && go mod download
      - name: Vet
        working-directory: services/${{ matrix.service }}
        run: go vet ./...
      - name: Test
        working-directory: services/${{ matrix.service }}
        run: go test -v -race -coverprofile=coverage.out ./...
      - uses: codecov/codecov-action@v4
        with:
          files: services/${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          - inference-gateway
          - model-router
          - request-scheduler
          - cache-service
          - worker-simulator
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            latest
      - uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: GitOps Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update image tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          for service in inference-gateway model-router request-scheduler cache-service worker-simulator; do
            sed -i "s|image: timothydevQ/${service}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${service}:${SHORT_SHA}|g" \
              infrastructure/kubernetes/services/deployments.yaml || true
          done
      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/kubernetes/ || true
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.sha }}"
          git push
